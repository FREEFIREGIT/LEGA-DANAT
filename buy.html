<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Покупка алмазов — LEGA 💎</title>
  <link rel="icon" href="ЛЕГА.png">
  <style>
    :root{
      --bg:#050408; --panel:rgba(255,255,255,0.03);
      --neon:#ff2d55; --neon2:#ff6b6b; --muted:#9aa0a6;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,Segoe UI,Roboto;background:var(--bg);color:#fff;padding:20px}
    a{color:#fff;text-decoration:none}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
    .logo{font-weight:900;color:var(--neon);font-size:22px}
    nav a{margin-left:16px;opacity:.75}
    nav a:hover{opacity:1}

    .card{
      background:var(--panel);
      padding:20px;
      border-radius:14px;
      max-width:600px;
      margin:0 auto;
      border:1px solid rgba(255,255,255,0.04)
    }

    h2{margin-bottom:12px;color:var(--neon)}
    label{display:block;margin-top:14px;font-size:14px;color:var(--muted)}

    input,select{
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.05);
      background:transparent;
      color:#fff
    }

    textarea{
      width:100%;
      padding:12px;
      margin-top:6px;
      height:140px;
      border-radius:10px;
      background:#07070b;
      border:1px solid rgba(255,255,255,0.05);
      color:#fff
    }

    .btn{
      margin-top:14px;
      padding:14px 18px;
      border-radius:12px;
      border:none;
      width:100%;
      background:linear-gradient(90deg,var(--neon),var(--neon2));
      color:#fff;
      font-weight:700;
      font-size:16px;
      cursor:pointer
    }

    .btn:hover{opacity:.9}
    .price{margin-top:14px;font-size:16px;color:var(--neon2);font-weight:700}
    .result{margin-top:20px}
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">LEGA</a>
  <nav>
    <a href="index.html">Главная</a>
    <a href="about.html">О нас</a>
    <a href="support.html">Поддержка</a>
  </nav>
</header>

<div class="card">
  <h2>Покупка алмазов</h2>

  <label>Ваш ID в Free Fire:</label>
  <input id="ffid" type="text" placeholder="Например: 123456789">

  <label>Выберите пакет алмазов:</label>
  <select id="pack" onchange="updatePrice()">
    <option value="100">100💎</option>
    <option value="200">200💎</option>
    <option value="300">300💎</option>
    <option value="400">400💎</option>
    <option value="500">500💎</option>
    <option value="1000">1000💎</option>
    <option value="2000">2000💎</option>
    <option value="1">Ваучер Lite 🎟️</option>
    <option value="2">Ваучер на неделю 🎫</option>
    <option value="3">Ваучер на месяц 🎫</option>
    <option value="4">Evo-пропуск на 3 дня 🏷️</option>
    <option value="5">Evo-пропуск на 7 дней 🏷️</option>
    <option value="6">Evo-пропуск на 30 дней 🏷️</option>
    <option value="7">BOOYAH! Пропуск 🔑</option>
  </select>

  <div class="price" id="price">Цена: 10 сомони</div>

  <label>Сообщение администратору (необязательно):</label>
  <input id="msg" type="text" placeholder="Комментарий к заказу">

  <button class="btn" onclick="sendToTG()">Оформить заказ</button>

  <div class="result">
    <label>Текст заказа:</label>
    <textarea id="output" readonly></textarea>
  </div>
</div>

<script>
function updatePrice(){
  const prices = {
    100:"10",200:"20",300:"30",400:"40",500:"50",
    1000:"100",2000:"200",1:"10",2:"15",3:"110",
    4:"8",5:"10",6:"30",7:"30"
  };
  let pack = packSelect().value;
  document.getElementById("price").textContent =
    "Цена: " + (prices[pack] || "—") + " сомони";
}

function packSelect(){
  return document.getElementById("pack");
}

function sendToTG(){
  let id = ffid.value.trim();
  if(id.length < 3){
    alert("Введите корректный ID");
    return;
  }

  let text =
`🛒 НОВЫЙ ЗАКАЗ
━━━━━━━━━━━━━━
🎮 ID: ${id}
💎 Пакет: ${packSelect().options[packSelect().selectedIndex].text}
📝 Сообщение: ${msg.value || "—"}
━━━━━━━━━━━━━━
Админ: Samir`;

  output.value = text;

  let encoded = encodeURIComponent(text);
  window.open(
  "https://t.me/samirdavlyatov?text=" + encoded,
  "_blank"
);
}
</script>

</body>
</html>
